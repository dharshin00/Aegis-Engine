<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Aegis | Authentication</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f111a;
            --bg-panel: rgba(20, 24, 39, 0.7);
            --accent-primary: #3b82f6;
            --accent-success: #10b981;
            --accent-danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-light: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(239, 68, 68, 0.05), transparent 25%);
            background-attachment: fixed;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo i {
            font-size: 3rem;
            color: var(--accent-primary);
            margin-bottom: 1rem;
            display: inline-block;
            filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.5));
        }

        .logo h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .logo p {
            margin: 0.5rem 0 0 0;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-light);
            color: var(--text-main);
            padding: 0.8rem 1rem;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
            background: rgba(0, 0, 0, 0.4);
        }

        .login-btn {
            width: 100%;
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 1rem;
        }

        .login-btn:hover {
            background: #2563eb;
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
            transform: translateY(-1px);
        }

        .login-btn:active {
            transform: translateY(1px);
        }

        .error-message {
            color: var(--accent-danger);
            font-size: 0.85rem;
            text-align: center;
            margin-top: 1rem;
            display: none;
            background: rgba(239, 68, 68, 0.1);
            padding: 0.5rem;
            border-radius: 6px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo">
            <i class="fa-solid fa-shield-halved"></i>
            <h1>PROJECT AEGIS</h1>
            <p>Intelligence Engine</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Administrator ID</label>
                <input type="text" id="username" required autocomplete="off" placeholder="Enter admin ID">
            </div>
            
            <div class="form-group">
                <label for="password">Authentication Key</label>
                <input type="password" id="password" required placeholder="Enter secure key">
            </div>

            <button type="submit" class="login-btn">
                <i class="fa-solid fa-lock" style="margin-right: 8px;"></i> Authenticate
            </button>
            
            <div id="error-msg" class="error-message">
                <i class="fa-solid fa-circle-exclamation"></i> Invalid credentials.
            </div>
        </form>
    </div>

    <script>
        // Check if already authenticated
        if (localStorage.getItem('aegis_token') === 'verified-admin-session') {
            window.location.href = '/';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');
            
            const btn = document.querySelector('.login-btn');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin" style="margin-right: 8px;"></i> Verifying...';
            btn.style.opacity = '0.8';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('aegis_token', data.token);
                    window.location.href = '/';
                } else {
                    errorDiv.style.display = 'block';
                    btn.innerHTML = '<i class="fa-solid fa-lock" style="margin-right: 8px;"></i> Authenticate';
                    btn.style.opacity = '1';
                }
            } catch (err) {
                errorDiv.innerText = 'Connection error to Engine API';
                errorDiv.style.display = 'block';
                btn.innerHTML = '<i class="fa-solid fa-lock" style="margin-right: 8px;"></i> Authenticate';
                btn.style.opacity = '1';
            }
        });
    </script>
</body>
</html>
